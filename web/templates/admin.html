<!DOCTYPE html>
<html>

<head>
  <title>Admin View</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f0f0f0;
      margin: 0;
    }

    .main-container {
      display: flex;
      width: 90%;
      max-width: 1200px;
      height: 90vh;
      background: white;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    #chat-area {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
      border-right: 1px solid #ccc;
      overflow-y: auto;
    }

    #side-panel {
      width: 300px;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th,
    td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }

    th {
      background-color: #f2f2f2;
    }

    #controls button {
      background-color: #008CBA;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1em;
      margin-top: 10px;
      width: 100%;
    }

    #controls button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="main-container">
    <div id="chat-area">
      <h2>Chat History</h2>
      {% for username, history in history_data.items() %}
      <h3>{{ username }}</h3>
      <table>
        <thead>
          <tr>
            <th>Question</th>
            <th>Response</th>
          </tr>
        </thead>
        <tbody>
          {% for item in history %}
          <tr>
            <td>{{ item.question }}</td>
            <td>{{ item.response }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
      {% endfor %}
    </div>
    <div id="side-panel">
      <div id="controls">
        <form action="/delete_all_history" method="post">
          <button type="submit" style="background-color: #f44336;">Delete All History</button>
        </form>
        <form action="/" method="get">
          <button type="submit" style="background-color: #4CAF50;">Go to Home</button>
        </form>
      </div>
    </div>
  </div>
</body>

</html>
